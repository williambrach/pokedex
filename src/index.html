<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pokédex — Card Collection</title>
<meta name="description" content="Track your Pokémon card collection and wishlist with live Cardmarket price estimates. Runs entirely in your browser — no account, no backend.">
<meta name="theme-color" content="#fbfbfd">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pokédex">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://api.pokemontcg.io" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="root"></div>

<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./app.js" defer></script>

<script>
  // Scale the 402×874 device mockup to fit the viewport (desktop / large screens).
  // On phones the app renders full-screen and ignores this.
  function fitDevice() {
    var W = 402, H = 874, pad = 24;
    var s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1.15);
    document.documentElement.style.setProperty('--scale', Math.max(s, 0.2));
  }
  window.addEventListener('resize', fitDevice);
  fitDevice();
</script>
</body>
</html>
